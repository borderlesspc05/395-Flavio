# Render — Web Service (API Magnus Mind)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: three95-flavio
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: http://localhost:5173,https://app.magnusmind.io,https://395-flavio2.netlify.app,https://395-flavio.netlify.app
      - key: FRONTEND_URL
        value: https://app.magnusmind.io
      # IA real — cole OPENAI_API_KEY no painel (Secret); mesma chave do server/.env local
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_DEFAULT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
